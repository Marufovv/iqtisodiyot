  <script>
    // ── JSONbin.io real-time cloud leaderboard ──
    const JSONBIN_KEY = "$2a$10$D7I4G0HD.BiS0sa5WE5GTOtJRPe9Dthyihygr.19kF0nVj5A8DRY.";
    const JSONBIN_URL = "https://api.jsonbin.io/v3/b";
    const LS_BIN_KEY = "iq_jsonbin_id";

    // Get or create the shared bin ID
    async function getOrCreateBin() {
      let binId = localStorage.getItem(LS_BIN_KEY);
      if (binId) return binId;
      // Create new bin
      const res = await fetch(JSONBIN_URL, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "X-Master-Key": JSONBIN_KEY,
          "X-Bin-Name": "iq-leaderboard",
          "X-Bin-Private": "false"
        },
        body: JSON.stringify({ leaderboard: {} })
      });
      const data = await res.json();
      binId = data.metadata.id;
      localStorage.setItem(LS_BIN_KEY, binId);
      return binId;
    }

    async function readBin(binId) {
      const res = await fetch(`${JSONBIN_URL}/${binId}/latest`, {
        headers: { "X-Master-Key": JSONBIN_KEY }
      });
      const data = await res.json();
      return data.record;
    }

    async function writeBin(binId, record) {
      await fetch(`${JSONBIN_URL}/${binId}`, {
        method: "PUT",
        headers: {
          "Content-Type": "application/json",
          "X-Master-Key": JSONBIN_KEY
        },
        body: JSON.stringify(record)
      });
    }

    // localStorage fallback for personal (non-shared) data
    const _ls = {
      get: (k) => { try { return JSON.parse(localStorage.getItem('iq_' + k)); } catch { return null; } },
      set: (k, v) => { try { localStorage.setItem('iq_' + k, JSON.stringify(v)); } catch {} }
    };

    // window.storage API — shared=true uses JSONbin, shared=false uses localStorage
    window.storage = {
      _bin: null,
      _cache: null,
      _dirty: false,

      async _ensureBin() {
        if (!this._bin) {
          // Try to find existing bin from a known shared key
          const shared = localStorage.getItem('iq_shared_bin');
          if (shared) {
            this._bin = shared;
          } else {
            this._bin = await getOrCreateBin();
            localStorage.setItem('iq_shared_bin', this._bin);
          }
        }
        return this._bin;
      },

      async _read() {
        const binId = await this._ensureBin();
        try {
          const record = await readBin(binId);
          this._cache = record || { leaderboard: {} };
        } catch {
          this._cache = this._cache || { leaderboard: {} };
        }
        return this._cache;
      },

      async get(key, shared) {
        if (!shared) {
          const v = localStorage.getItem('iq_p_' + key);
          return v ? { key, value: v, shared: false } : null;
        }
        try {
          const record = await this._read();
          const lb = record.leaderboard || {};
          const safeKey = key.replace(/^lb:/, '');
          const v = lb[safeKey];
          return v ? { key, value: JSON.stringify(v), shared: true } : null;
        } catch { return null; }
      },

      async set(key, value, shared) {
        if (!shared) {
          localStorage.setItem('iq_p_' + key, value);
          return { key, value, shared: false };
        }
        try {
          const binId = await this._ensureBin();
          const record = await this._read();
          if (!record.leaderboard) record.leaderboard = {};
          const safeKey = key.replace(/^lb:/, '');
          const parsed = typeof value === 'string' ? JSON.parse(value) : value;
          record.leaderboard[safeKey] = parsed;
          this._cache = record;
          await writeBin(binId, record);
          return { key, value, shared: true };
        } catch(e) { console.error('storage.set error:', e); return null; }
      },

      async list(prefix, shared) {
        if (!shared) {
          const p = 'iq_p_' + (prefix || '');
          const keys = [];
          for (let i = 0; i < localStorage.length; i++) {
            const k = localStorage.key(i);
            if (k && k.startsWith(p)) keys.push(k.slice(('iq_p_').length));
          }
          return { keys, prefix, shared: false };
        }
        try {
          const record = await this._read();
          const lb = record.leaderboard || {};
          const safePrefix = (prefix || '').replace(/^lb:/, '');
          const keys = Object.keys(lb)
            .filter(k => !safePrefix || k.startsWith(safePrefix))
            .map(k => 'lb:' + k);
          return { keys, prefix, shared: true };
        } catch { return { keys: [], prefix, shared: true }; }
      }
    };

    // Personal data still uses localStorage (history, stats, user)
    window._lsStorage = _ls;
  </script>
